<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Ocorrências</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f4f1eb;
        --surface: #ffffff;
        --surface-2: #faf8f4;
        --ink: #1c1712;
        --ink-2: #5a5248;
        --ink-3: #9c8f84;
        --accent: #b8621e;
        --accent-light: #fdf0e6;
        --border: rgba(28, 23, 18, 0.1);
        --border-md: rgba(28, 23, 18, 0.16);
        --radius: 10px;
        --radius-lg: 16px;
        --shadow:
          0 1px 3px rgba(28, 23, 18, 0.06), 0 4px 12px rgba(28, 23, 18, 0.04);
        --shadow-lg:
          0 2px 8px rgba(28, 23, 18, 0.08), 0 12px 32px rgba(28, 23, 18, 0.06);
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.6;
      }

      /* HEADER */
      .app-header {
        background: var(--ink);
        padding: 0 2rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 60px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-icon {
        width: 32px;
        height: 32px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-icon svg {
        width: 18px;
        height: 18px;
        stroke: #fff;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .logo-text {
        font-family: "Outfit", sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        letter-spacing: -0.2px;
      }
      .logo-sub {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        font-weight: 400;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .header-stats {
        display: flex;
        gap: 24px;
      }
      .stat-item {
        text-align: right;
      }
      .stat-val {
        font-family: "Outfit", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        line-height: 1;
      }
      .stat-lbl {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      /* LAYOUT */
      .app-body {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem;
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 24px;
        align-items: start;
      }

      /* PANEL */
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .panel-header {
        padding: 1.25rem 1.5rem 1rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .panel-title {
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 600;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-title svg {
        width: 16px;
        height: 16px;
        stroke: var(--accent);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .panel-body {
        padding: 1.5rem;
      }

      /* FORM */
      .form-group {
        margin-bottom: 1.1rem;
      }
      .form-label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--ink-2);
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .form-label span {
        color: var(--accent);
      }
      .form-input,
      .form-select,
      .form-textarea {
        width: 100%;
        background: var(--surface-2);
        border: 1px solid var(--border-md);
        border-radius: var(--radius);
        padding: 10px 13px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        color: var(--ink);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        outline: none;
      }
      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(184, 98, 30, 0.1);
        background: #fff;
      }
      .form-textarea {
        resize: vertical;
        min-height: 80px;
        line-height: 1.5;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 11px 20px;
        border-radius: var(--radius);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
      }
      .btn svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        width: 100%;
        margin-top: 0.5rem;
      }
      .btn-primary:hover {
        background: #9e5218;
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .btn-ghost {
        background: transparent;
        color: var(--ink-3);
        padding: 6px 10px;
        font-size: 13px;
      }
      .btn-ghost:hover {
        background: var(--surface-2);
        color: var(--ink);
      }
      .btn-danger {
        background: transparent;
        color: #c0392b;
        padding: 6px 10px;
        font-size: 13px;
      }
      .btn-danger:hover {
        background: #fdf2f2;
      }

      /* RIGHT PANEL */
      .right-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* SEARCH */
      .search-bar {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .search-bar svg {
        width: 18px;
        height: 18px;
        stroke: var(--ink-3);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }
      .search-input {
        border: none;
        outline: none;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        color: var(--ink);
        background: transparent;
        flex: 1;
      }
      .search-input::placeholder {
        color: var(--ink-3);
      }
      .search-count {
        font-size: 12px;
        color: var(--ink-3);
        white-space: nowrap;
      }

      /* FILTER TABS */
      .filter-tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .filter-tab {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid var(--border-md);
        background: var(--surface);
        color: var(--ink-2);
        transition: all 0.15s;
      }
      .filter-tab:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .filter-tab.active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      /* CARDS */
      .occurrences-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .occ-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 1.25rem 1.5rem;
        transition:
          box-shadow 0.15s,
          border-color 0.15s;
        position: relative;
        overflow: hidden;
      }
      .occ-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
      }
      .occ-card.status-pendente::before {
        background: #d97706;
      }
      .occ-card.status-resolvido::before {
        background: #059669;
      }
      .occ-card.status-andamento::before {
        background: #2563eb;
      }
      .occ-card.status-urgente::before {
        background: #dc2626;
      }

      .occ-card:hover {
        box-shadow: var(--shadow-lg);
        border-color: var(--border-md);
      }

      .occ-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .occ-client {
        font-family: "Outfit", sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.2;
      }
      .occ-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .occ-actions button svg {
        width: 14px;
        height: 14px;
      }

      .occ-desc {
        font-size: 14px;
        color: var(--ink-2);
        margin-bottom: 12px;
        line-height: 1.55;
      }

      .occ-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
      }
      .badge svg {
        width: 12px;
        height: 12px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .badge-pendente {
        background: #fffbeb;
        color: #92400e;
        border: 1px solid #fcd34d;
      }
      .badge-resolvido {
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #6ee7b7;
      }
      .badge-andamento {
        background: #eff6ff;
        color: #1e40af;
        border: 1px solid #93c5fd;
      }
      .badge-urgente {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }

      .badge-date {
        background: var(--surface-2);
        color: var(--ink-2);
        border: 1px solid var(--border-md);
      }
      .badge-value {
        background: var(--accent-light);
        color: var(--accent);
        border: 1px solid rgba(184, 98, 30, 0.2);
        font-weight: 600;
      }
      .badge-return {
        background: #f0f9ff;
        color: #0369a1;
        border: 1px solid #bae6fd;
      }

      /* EMPTY */
      .empty-state {
        text-align: center;
        padding: 3rem 1.5rem;
        color: var(--ink-3);
      }
      .empty-state svg {
        width: 48px;
        height: 48px;
        stroke: var(--border-md);
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        margin-bottom: 1rem;
      }
      .empty-state p {
        font-size: 14px;
      }
      .empty-state strong {
        display: block;
        font-size: 16px;
        color: var(--ink-2);
        margin-bottom: 4px;
        font-family: "Outfit", sans-serif;
      }

      /* MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--surface);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 480px;
        transform: translateY(12px);
        transition: transform 0.2s;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-overlay.open .modal {
        transform: translateY(0);
      }
      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
      }
      .modal-head-title {
        font-family: "Outfit", sans-serif;
        font-size: 16px;
        font-weight: 600;
      }
      .modal-close {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        color: var(--ink-3);
        border-radius: 6px;
        display: flex;
      }
      .modal-close:hover {
        background: var(--surface-2);
        color: var(--ink);
      }
      .modal-close svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
      }
      .modal-body {
        padding: 1.5rem;
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        background: var(--ink);
        color: #fff;
        padding: 12px 18px;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 500;
        z-index: 999;
        transform: translateY(20px);
        opacity: 0;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .toast.success {
        background: #065f46;
      }
      .toast.error {
        background: #991b1b;
      }
      .toast svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* RESPONSIVE */
      @media (max-width: 800px) {
        .app-body {
          grid-template-columns: 1fr;
          padding: 1rem;
        }
        .header-stats {
          gap: 16px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24">
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
          </div>
          <div>
            <div class="logo-text">Ocorrências</div>
            <div class="logo-sub">Registro de Clientes</div>
          </div>
        </div>
        <div class="header-stats">
          <div class="stat-item">
            <div class="stat-val" id="stat-total">0</div>
            <div class="stat-lbl">Total</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="stat-pendente">0</div>
            <div class="stat-lbl">Pendentes</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="stat-urgente">0</div>
            <div class="stat-lbl">Urgentes</div>
          </div>
        </div>
      </div>
    </header>

    <div class="app-body">
      <!-- FORM PANEL -->
      <aside>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
              Nova Ocorrência
            </span>
          </div>
          <div class="panel-body">
            <div class="form-group">
              <label class="form-label">Nome do Cliente <span>*</span></label>
              <input
                type="text"
                class="form-input"
                id="f-cliente"
                placeholder="Ex: João da Silva"
                autocomplete="off"
              />
            </div>
            <div class="form-group">
              <label class="form-label"
                >Descrição da Ocorrência <span>*</span></label
              >
              <textarea
                class="form-textarea"
                id="f-desc"
                placeholder="Descreva o que aconteceu, combinado ou pendência..."
              ></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Valor (R$)</label>
                <input
                  type="number"
                  class="form-input"
                  id="f-valor"
                  placeholder="0,00"
                  min="0"
                  step="0.01"
                />
              </div>
              <div class="form-group">
                <label class="form-label">Status <span>*</span></label>
                <select class="form-select" id="f-status">
                  <option value="pendente">⏳ Pendente</option>
                  <option value="andamento">🔵 Em andamento</option>
                  <option value="urgente">🔴 Urgente</option>
                  <option value="resolvido">✅ Resolvido</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label"
                  >Data da Ocorrência <span>*</span></label
                >
                <input type="date" class="form-input" id="f-data" />
              </div>
              <div class="form-group">
                <label class="form-label">Retorno Previsto</label>
                <input type="date" class="form-input" id="f-retorno" />
              </div>
            </div>
            <button class="btn btn-primary" id="btn-salvar">
              <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              Salvar Ocorrência
            </button>
          </div>
        </div>
      </aside>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <div class="search-bar">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Pesquisar por nome do cliente..."
          />
          <span class="search-count" id="search-count"></span>
        </div>

        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
          "
        >
          <div style="display: flex; gap: 8px; flex-wrap: wrap">
            <button class="btn btn-ghost" id="btn-exportar">
              Exportar backup
            </button>

            <label
              class="btn btn-ghost"
              for="input-importar"
              style="cursor: pointer"
            >
              Importar backup
            </label>
            <input
              type="file"
              id="input-importar"
              accept=".json"
              style="display: none"
            />
          </div>

          <div class="filter-tabs" id="filter-tabs">
            <button class="filter-tab active" data-filter="todos">Todos</button>
            <button class="filter-tab" data-filter="pendente">Pendentes</button>
            <button class="filter-tab" data-filter="andamento">
              Em andamento
            </button>
            <button class="filter-tab" data-filter="urgente">Urgentes</button>
            <button class="filter-tab" data-filter="resolvido">
              Resolvidos
            </button>
          </div>
          <select
            class="form-select"
            id="sort-select"
            style="width: auto; font-size: 13px; padding: 5px 10px"
          >
            <option value="newer">Mais recentes</option>
            <option value="older">Mais antigos</option>
            <option value="client">Nome do cliente</option>
          </select>
        </div>

        <div class="occurrences-list" id="list"></div>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-head">
          <span class="modal-head-title">Editar Ocorrência</span>
          <button class="modal-close" id="modal-close">
            <svg viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label"
              >Nome do Cliente
              <span style="color: var(--accent)">*</span></label
            >
            <input type="text" class="form-input" id="e-cliente" />
          </div>
          <div class="form-group">
            <label class="form-label"
              >Descrição <span style="color: var(--accent)">*</span></label
            >
            <textarea class="form-textarea" id="e-desc"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Valor (R$)</label>
              <input
                type="number"
                class="form-input"
                id="e-valor"
                min="0"
                step="0.01"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-select" id="e-status">
                <option value="pendente">⏳ Pendente</option>
                <option value="andamento">🔵 Em andamento</option>
                <option value="urgente">🔴 Urgente</option>
                <option value="resolvido">✅ Resolvido</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Data da Ocorrência</label>
              <input type="date" class="form-input" id="e-data" />
            </div>
            <div class="form-group">
              <label class="form-label">Retorno Previsto</label>
              <input type="date" class="form-input" id="e-retorno" />
            </div>
          </div>
          <button class="btn btn-primary" id="btn-update">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
            Atualizar Ocorrência
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
      <svg id="toast-icon" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
      </svg>
      <span id="toast-msg"></span>
    </div>

    <script>
      const STORAGE_KEY = "ocorrencias_v1";
      let records = [];
      let editingId = null;
      let activeFilter = "todos";
      let searchTerm = "";
      let sortMode = "newer";

      function load() {
        try {
          records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
          records = [];
        }
      }
      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }
      function genId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      }

      function fmtDate(d) {
        if (!d) return null;
        const [y, m, dia] = d.split("-");
        return `${dia}/${m}/${y}`;
      }
      function fmtVal(v) {
        if (v === "" || v === null || v === undefined || isNaN(v)) return null;
        return (
          "R$ " +
          parseFloat(v).toLocaleString("pt-BR", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          })
        );
      }
      function statusLabel(s) {
        return (
          {
            pendente: "Pendente",
            andamento: "Em andamento",
            urgente: "Urgente",
            resolvido: "Resolvido",
          }[s] || s
        );
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function toast(msg, type = "success") {
        const el = document.getElementById("toast");
        const icon = document.getElementById("toast-icon");
        document.getElementById("toast-msg").textContent = msg;
        el.className = `toast ${type} show`;
        if (type === "success")
          icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
        else
          icon.innerHTML =
            '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>';
        setTimeout(() => el.classList.remove("show"), 2800);
      }

      function updateStats() {
        document.getElementById("stat-total").textContent = records.length;
        document.getElementById("stat-pendente").textContent = records.filter(
          (r) => r.status === "pendente",
        ).length;
        document.getElementById("stat-urgente").textContent = records.filter(
          (r) => r.status === "urgente",
        ).length;
      }

      function getFiltered() {
        let r = [...records];
        if (searchTerm) {
          const s = searchTerm.toLowerCase();
          r = r.filter((x) => x.cliente.toLowerCase().includes(s));
        }
        if (activeFilter !== "todos")
          r = r.filter((x) => x.status === activeFilter);
        if (sortMode === "newer") r.sort((a, b) => b.id.localeCompare(a.id));
        else if (sortMode === "older")
          r.sort((a, b) => a.id.localeCompare(b.id));
        else if (sortMode === "client")
          r.sort((a, b) => a.cliente.localeCompare(b.cliente, "pt-BR"));
        return r;
      }

      function render() {
        const filtered = getFiltered();
        const list = document.getElementById("list");
        const cnt = document.getElementById("search-count");
        cnt.textContent = `${filtered.length} registro${filtered.length !== 1 ? "s" : ""}`;

        if (filtered.length === 0) {
          list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      <strong>${searchTerm || activeFilter !== "todos" ? "Nenhum resultado encontrado" : "Nenhuma ocorrência cadastrada"}</strong>
      <p>${searchTerm ? "Tente outro nome de cliente." : activeFilter !== "todos" ? "Sem registros com esse filtro." : "Use o painel ao lado para adicionar a primeira ocorrência."}</p>
    </div>`;
          return;
        }

        list.innerHTML = filtered
          .map((r) => {
            const val = fmtVal(r.valor);
            const dateFmt = fmtDate(r.data);
            const retFmt = fmtDate(r.retorno);
            return `<div class="occ-card status-${r.status}" data-id="${r.id}">
      <div class="occ-top">
        <div class="occ-client">${esc(r.cliente)}</div>
        <div class="occ-actions">
          <button class="btn btn-ghost" title="Editar" onclick="openEdit('${r.id}')">
            <svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn btn-danger" title="Excluir" onclick="deleteRec('${r.id}')">
            <svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
      <div class="occ-desc">${esc(r.desc)}</div>
      <div class="occ-meta">
        <span class="badge badge-${r.status}">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          ${statusLabel(r.status)}
        </span>
        ${
          dateFmt
            ? `<span class="badge badge-date">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${dateFmt}
        </span>`
            : ""
        }
        ${
          val
            ? `<span class="badge badge-value">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          ${val}
        </span>`
            : ""
        }
        ${
          retFmt
            ? `<span class="badge badge-return">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Retorno: ${retFmt}
        </span>`
            : ""
        }
      </div>
    </div>`;
          })
          .join("");
        updateStats();
      }

      function esc(str) {
        return (str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // SAVE
      document.getElementById("btn-salvar").addEventListener("click", () => {
        const cliente = document.getElementById("f-cliente").value.trim();
        const desc = document.getElementById("f-desc").value.trim();
        const valor = document.getElementById("f-valor").value;
        const status = document.getElementById("f-status").value;
        const data = document.getElementById("f-data").value;
        const retorno = document.getElementById("f-retorno").value;

        if (!cliente) {
          toast("Informe o nome do cliente.", "error");
          document.getElementById("f-cliente").focus();
          return;
        }
        if (!desc) {
          toast("Informe a descrição da ocorrência.", "error");
          document.getElementById("f-desc").focus();
          return;
        }
        if (!data) {
          toast("Informe a data da ocorrência.", "error");
          document.getElementById("f-data").focus();
          return;
        }

        const rec = {
          id: genId(),
          cliente,
          desc,
          valor: valor !== "" ? parseFloat(valor) : "",
          status,
          data,
          retorno,
          criadoEm: new Date().toISOString(),
        };
        records.unshift(rec);
        save();
        render();

        document.getElementById("f-cliente").value = "";
        document.getElementById("f-desc").value = "";
        document.getElementById("f-valor").value = "";
        document.getElementById("f-status").value = "pendente";
        document.getElementById("f-data").value = "";
        document.getElementById("f-retorno").value = "";
        document.getElementById("f-cliente").focus();
        toast("Ocorrência salva com sucesso!");
      });

      // DELETE
      window.deleteRec = function (id) {
        if (!confirm("Deseja excluir esta ocorrência?")) return;
        records = records.filter((r) => r.id !== id);
        save();
        render();
        toast("Ocorrência excluída.");
      };

      // EDIT
      window.openEdit = function (id) {
        const r = records.find((x) => x.id === id);
        if (!r) return;
        editingId = id;
        document.getElementById("e-cliente").value = r.cliente;
        document.getElementById("e-desc").value = r.desc;
        document.getElementById("e-valor").value =
          r.valor !== "" ? r.valor : "";
        document.getElementById("e-status").value = r.status;
        document.getElementById("e-data").value = r.data;
        document.getElementById("e-retorno").value = r.retorno || "";
        document.getElementById("modal").classList.add("open");
      };

      document
        .getElementById("modal-close")
        .addEventListener("click", closeModal);
      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });
      function closeModal() {
        document.getElementById("modal").classList.remove("open");
        editingId = null;
      }

      document.getElementById("btn-update").addEventListener("click", () => {
        const cliente = document.getElementById("e-cliente").value.trim();
        const desc = document.getElementById("e-desc").value.trim();
        if (!cliente || !desc) {
          toast("Preencha os campos obrigatórios.", "error");
          return;
        }
        const idx = records.findIndex((r) => r.id === editingId);
        if (idx === -1) return;
        const valor = document.getElementById("e-valor").value;
        records[idx] = {
          ...records[idx],
          cliente,
          desc,
          valor: valor !== "" ? parseFloat(valor) : "",
          status: document.getElementById("e-status").value,
          data: document.getElementById("e-data").value,
          retorno: document.getElementById("e-retorno").value,
        };
        save();
        render();
        closeModal();
        toast("Ocorrência atualizada!");
      });

      // SEARCH
      document.getElementById("search-input").addEventListener("input", (e) => {
        searchTerm = e.target.value.trim();
        render();
      });

      // FILTER TABS
      document.getElementById("filter-tabs").addEventListener("click", (e) => {
        const tab = e.target.closest(".filter-tab");
        if (!tab) return;
        document
          .querySelectorAll(".filter-tab")
          .forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        activeFilter = tab.dataset.filter;
        render();
      });

      // SORT
      document.getElementById("sort-select").addEventListener("change", (e) => {
        sortMode = e.target.value;
        render();
      });

// EXPORTAR BACKUP
document.getElementById('btn-exportar').addEventListener('click', () => {
  const dados = localStorage.getItem(STORAGE_KEY) || '[]';

  const hoje = new Date().toISOString().slice(0, 10);
  const nomeArquivo = `backup-ocorrencias-${hoje}.json`;

  const blob = new Blob([dados], { type: 'application/json' });
  const url = URL.createObjectURL(blob);

  const link = document.createElement('a');
  link.href = url;
  link.download = nomeArquivo;
  link.click();

  URL.revokeObjectURL(url);

  toast('Backup exportado com sucesso!');
});

// IMPORTAR BACKUP
document.getElementById('input-importar').addEventListener('change', (event) => {
  const arquivo = event.target.files[0];

  if (!arquivo) return;

  const leitor = new FileReader();

  leitor.onload = function(e) {
    try {
      const dadosImportados = JSON.parse(e.target.result);

      if (!Array.isArray(dadosImportados)) {
        toast('Arquivo de backup inválido.', 'error');
        return;
      }

      const confirmar = confirm(
        'Deseja importar este backup? Isso vai substituir os registros atuais.'
      );

      if (!confirmar) return;

      records = dadosImportados;
      save();
      render();

      toast('Backup importado com sucesso!');
    } catch (erro) {
      toast('Erro ao importar o backup.', 'error');
    }
  };

  leitor.readAsText(arquivo);

  event.target.value = '';
});

      // INIT
      document.getElementById("f-data").value = today();
      load();
      render();
    </script>
  </body>
</html>
