<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Ocorrências</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24">
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
          </div>
          <div>
            <div class="logo-text">Ocorrências</div>
            <div class="logo-sub">Registro de Clientes</div>
          </div>
        </div>
        <div class="header-stats">
          <div class="stat-item">
            <div class="stat-val" id="stat-total">0</div>
            <div class="stat-lbl">Total</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="stat-pendente">0</div>
            <div class="stat-lbl">Pendentes</div>
          </div>
          <div class="stat-item">
            <div class="stat-val" id="stat-urgente">0</div>
            <div class="stat-lbl">Urgentes</div>
          </div>
        </div>
      </div>
    </header>

    <div class="app-body">
      <!-- FORM PANEL -->
      <aside>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
              Nova Ocorrência
            </span>
          </div>
          <div class="panel-body">
            <div class="form-group">
              <label class="form-label">Nome do Cliente <span>*</span></label>
              <input
                type="text"
                class="form-input"
                id="f-cliente"
                placeholder="Ex: João da Silva"
                autocomplete="off"
              />
            </div>
            <div class="form-group">
              <label class="form-label"
                >Descrição da Ocorrência <span>*</span></label
              >
              <textarea
                class="form-textarea"
                id="f-desc"
                placeholder="Descreva o que aconteceu, combinado ou pendência..."
              ></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Valor (R$)</label>
                <input
                  type="number"
                  class="form-input"
                  id="f-valor"
                  placeholder="0,00"
                  min="0"
                  step="0.01"
                />
              </div>
              <div class="form-group">
                <label class="form-label">Status <span>*</span></label>
                <select class="form-select" id="f-status">
                  <option value="pendente"> Pendente</option>
                  <option value="andamento"> Em andamento</option>
                  <option value="urgente"> Urgente</option>
                  <option value="resolvido"> Resolvido</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label"
                  >Data da Ocorrência <span>*</span></label
                >
                <input type="date" class="form-input" id="f-data" />
              </div>
              <div class="form-group">
                <label class="form-label">Retorno Previsto</label>
                <input type="date" class="form-input" id="f-retorno" />
              </div>
            </div>
            <button class="btn btn-primary" id="btn-salvar">
              <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              Salvar Ocorrência
            </button>
          </div>
        </div>
      </aside>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <div class="search-bar">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Pesquisar por nome do cliente..."
          />
          <span class="search-count" id="search-count"></span>
        </div>

        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
          "
        >
          <div style="display: flex; gap: 8px; flex-wrap: wrap">
            <button class="btn btn-ghost" id="btn-exportar">
              Exportar backup
            </button>

            <label
              class="btn btn-ghost"
              for="input-importar"
              style="cursor: pointer"
            >
              Importar backup
            </label>
            <input
              type="file"
              id="input-importar"
              accept=".json"
              style="display: none"
            />
          </div>

          <div class="filter-tabs" id="filter-tabs">
            <button class="filter-tab active" data-filter="todos">Todos</button>
            <button class="filter-tab" data-filter="pendente">Pendentes</button>
            <button class="filter-tab" data-filter="andamento">
              Em andamento
            </button>
            <button class="filter-tab" data-filter="urgente">Urgentes</button>
            <button class="filter-tab" data-filter="resolvido">
              Resolvidos
            </button>
          </div>
          <select
            class="form-select"
            id="sort-select"
            style="width: auto; font-size: 13px; padding: 5px 10px"
          >
            <option value="newer">Mais recentes</option>
            <option value="older">Mais antigos</option>
            <option value="client">Nome do cliente</option>
          </select>
        </div>

        <div class="occurrences-list" id="list"></div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-head">
          <span class="modal-head-title">Editar Ocorrência</span>
          <button class="modal-close" id="modal-close">
            <svg viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label"
              >Nome do Cliente
              <span style="color: var(--accent)">*</span></label
            >
            <input type="text" class="form-input" id="e-cliente" />
          </div>
          <div class="form-group">
            <label class="form-label"
              >Descrição <span style="color: var(--accent)">*</span></label
            >
            <textarea class="form-textarea" id="e-desc"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Valor (R$)</label>
              <input
                type="number"
                class="form-input"
                id="e-valor"
                min="0"
                step="0.01"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-select" id="e-status">
                <option value="pendente"> Pendente</option>
                <option value="andamento"> Em andamento</option>
                <option value="urgente"> Urgente</option>
                <option value="resolvido"> Resolvido</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Data da Ocorrência</label>
              <input type="date" class="form-input" id="e-data" />
            </div>
            <div class="form-group">
              <label class="form-label">Retorno Previsto</label>
              <input type="date" class="form-input" id="e-retorno" />
            </div>
          </div>
          <button class="btn btn-primary" id="btn-update">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
            Atualizar Ocorrência
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
      <svg id="toast-icon" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
      </svg>
      <span id="toast-msg"></span>
    </div>
    <script src="script.js"></script>
  </body>
</html>
